name: Actualizar Dashboard Alcohol

on:
  schedule:
    - cron: '45 0 * * *'   # 18:30 CST todos los días
    - cron: '05 6 * * *'   # 23:50 CST todos los días
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests xlrd

      - name: Ejecutar script de actualización
        env:
          DRIVE_API_KEY: ${{ secrets.DRIVE_API_KEY }}
        run: python update_alcohol.py

      - name: Commit y push del HTML actualizado
        uses: EndBug/add-and-commit@v9
        with:
          add: 'index.html'
          message: 'bot: actualiza dashboard alcohol'
          default_author: github_actions
